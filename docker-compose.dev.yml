services:
  tripdb:
    image: postgres:16-alpine
    container_name: tripdb
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tripdb
    ports:
      - "5432:5432"
    volumes:
      - tripdb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tripdb"]
      interval: 5s
      timeout: 3s
      retries: 20

  trip-service:
    build:
      context: .
      dockerfile: services/trip-service/Dockerfile
    environment:
      PORT: "8081"
      DATABASE_URL: "postgres://postgres:postgres@tripdb:5432/tripdb?sslmode=disable"
      RABBIT_URL: "amqp://guest:guest@rabbitmq:5672/"
    depends_on:
      tripdb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "8081:8081"

  pricing-service:
    build:
      context: .
      dockerfile: services/pricing-service/Dockerfile
    environment:
      PORT: "8082"
      RABBIT_URL: "amqp://guest:guest@rabbitmq:5672/"
    ports:
      - "8082:8082"
    depends_on:
      rabbitmq:
        condition: service_healthy

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    environment:
      PORT: "8080"
      PRICING_URL: "http://pricing-service:8082"
      TRIP_URL: "http://trip-service:8081"
    depends_on:
      - trip-service
      - pricing-service
    ports:
      - "8080:8080"

  matching-service:
    build:
      context: .
      dockerfile: services/matching-service/Dockerfile
    environment:
      PORT: "8083"
      RABBIT_URL: "amqp://guest:guest@rabbitmq:5672/"
      REDIS_ADDR: "redis:6379"
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8083:8083"

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: intercity-sim-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
  
  redis:
    image: redis:7
    ports: ["6379:6379"]
    command: ["redis-server", "--appendonly", "yes"]
    volumes: [ "redisdata:/data" ]

volumes:
  tripdb_data:
  redisdata:
